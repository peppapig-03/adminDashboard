<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="searchBox">
                <button class="searchButton">
                    <img src="./search.png">
                </button>
                <form class="searchBar">
                    <input type="text" id="searchItem" placeholder="Search...">
                </form>
            </div>
            <div class="greetingBox">
                <svg class="profilePicture" viewBox="-5 -5 110 110">
                    <circle cx="50" cy="50" r="50">
                </svg>
                <div class="greetingInnerBox">
                    <div class="greetingHi">Hi there,</div>
                    <div class="greetingUsername">User_01</div>
                </div>
            </div>
            <div class="profileBox">
                <button class="notifications">
                    <img src="./bell.png">
                </button>
                <svg class="profilePicture" viewBox="-5 -5 110 110">
                    <circle cx="50" cy="50" r="50">
                </svg>
                <div class="username">User_01</div>
            </div>
            <div class="interactButtonBox">
                <button class="newButton">New</button>
                <button class="uploadButton">Upload</button>
                <button class="shareButton">Share</button>
            </div>
        </div>
        <div class="sidebar">
            <div class="dashboard">
                <svg class="dashboardPicture" viewBox="0 0 100 100">
                    <rect x="0" y="0" width="45" height="60"/>
                    <rect x="0" y="70" width="45" height="30"/>
                    <rect x="55" y="0" width="45" height="30"/>
                    <rect x="55" y="40" width="45" height="60"/>
                </svg>
                <div class="dashboardTitle">Dashboard</div>
            </div>
            <div class="firstList">
                <button id="Home">Home</button>
                <button id="Profile">Profile</button>
                <button id="Messages">Messages</button>
                <button id="Tasks">Tasks</button>
                <button id="Communities">Communities</button>
            </div>
            <div class="secondList">
                <button id="Settings">Settings</button>
                <button id="Support">Support</button>
                <button id="Privacy">Privacy</button>
            </div>
        </div>
        <div class="mainContent">

        </div>
    </div>
</body>
</html>
